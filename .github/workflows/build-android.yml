name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Run Android unit tests and build optimized APK
        working-directory: android
        run: ./gradlew testCiUnitTest assembleCi --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/ci/app-ci.apk TextCleaner.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: TextCleaner-ci-apk
          path: TextCleaner.apk
          retention-days: 30

      - name: Publish rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android – latest build
          prerelease: true
          body: |
            Automatically built from the latest commit on `main`.

            **Install:** enable *Install unknown apps* on your device, download `TextCleaner.apk`, and open it.
          files: TextCleaner.apk
