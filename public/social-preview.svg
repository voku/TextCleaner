<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">TextCleaner social preview</title>
  <desc id="desc">A preview card for the TextCleaner web app.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="84" y="84" width="1032" height="462" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="#c7d2fe" stroke-opacity="0.25" />
  <text x="120" y="210" fill="#e0e7ff" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">
    TextCleaner
  </text>
  <text x="120" y="282" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">
    Clean copied text
  </text>
  <text x="120" y="356" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="38">
    Remove GitHub, docs, article, and chat UI noise
  </text>
  <text x="120" y="412" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="38">
    before sending content to an LLM.
  </text>
  <rect x="120" y="462" width="276" height="72" rx="16" fill="#4f46e5" />
  <text x="156" y="510" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    voku.github.io
  </text>
